<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Signal Board - 24h Updates</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #DC2626;
        --bg-light: #FEF2F2;
        --bg-white: #FFFFFF;
        --text-dark: #1F2937;
        --text-muted: #6B7280;
        --border: #E5E7EB;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg-light);
        color: var(--text-dark);
        line-height: 1.5;
      }

      /* Header */
      .header {
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .header-title {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-dark);
      }

      .header-tag {
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--primary);
        background: var(--bg-light);
        padding: 0.125rem 0.5rem;
        border-radius: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .header-stats {
        display: flex;
        gap: 1rem;
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      .header-stats b {
        color: var(--primary);
        font-weight: 600;
      }

      /* Controls */
      .controls {
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        padding: 0.5rem 1.5rem;
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .search-box {
        flex: 1;
        min-width: 200px;
        position: relative;
      }

      .search-input {
        width: 100%;
        padding: 0.375rem 0.75rem 0.375rem 1.75rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        font-size: 0.8125rem;
        font-family: inherit;
        transition: border-color 0.15s;
        background: var(--bg-white);
      }

      .search-input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .search-icon {
        position: absolute;
        left: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        width: 0.875rem;
        height: 0.875rem;
        color: var(--text-muted);
      }

      .select-wrapper {
        position: relative;
      }

      .site-select {
        padding: 0.375rem 1.25rem 0.375rem 0.625rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        font-size: 0.8125rem;
        font-family: inherit;
        background: var(--bg-white);
        cursor: pointer;
        appearance: none;
      }

      .select-arrow {
        position: absolute;
        right: 0.375rem;
        top: 50%;
        transform: translateY(-50%);
        width: 0.75rem;
        height: 0.75rem;
        color: var(--text-muted);
        pointer-events: none;
      }

      /* Category Tabs */
      .category-tabs {
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        padding: 0.5rem 1.5rem;
        display: flex;
        gap: 0.25rem;
        overflow-x: auto;
      }

      .category-tab {
        padding: 0.375rem 0.875rem;
        border: none;
        border-bottom: 2px solid transparent;
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
        color: var(--text-muted);
        white-space: nowrap;
      }

      .category-tab.active {
        border-bottom-color: var(--primary);
        color: var(--primary);
      }

      .category-tab:hover {
        color: var(--primary);
      }

      /* Main Content */
      .main-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0.75rem 1.5rem;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-dark);
      }

      .result-count {
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      /* News Grid */
      .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .news-card {
        background: var(--bg-white);
        border-radius: 0.375rem;
        padding: 0.625rem;
        border: 1px solid var(--border);
        transition: all 0.15s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .news-card:hover {
        border-color: var(--primary);
        box-shadow: 0 1px 4px rgba(220, 38, 38, 0.1);
      }

      .card-meta {
        display: flex;
        gap: 0.375rem;
        align-items: center;
        font-size: 0.6875rem;
        flex-wrap: wrap;
      }

      .site-badge {
        font-weight: 500;
        color: var(--primary);
        background: var(--bg-light);
        padding: 0.0625rem 0.375rem;
        border-radius: 0.25rem;
      }

      .source-badge {
        color: var(--text-muted);
      }

      .time-badge {
        margin-left: auto;
        color: var(--text-muted);
      }

      .card-title {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        color: var(--text-dark);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .news-card:hover .card-title {
        color: var(--primary);
      }

      .card-title-en {
        font-size: 0.75rem;
        color: var(--text-muted);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .empty-state {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      /* Footer */
      .footer {
        text-align: center;
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header {
          padding: 0.5rem 1rem;
        }

        .header-stats {
          display: none;
        }

        .controls {
          padding: 0.5rem 1rem;
        }

        .search-box {
          width: 100%;
          flex: none;
        }

        .main-content {
          padding: 0.5rem 1rem;
        }

        .news-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1 class="header-title">24h AI 更新雷达</h1>
        <span class="header-tag">Live</span>
      </div>
      <div class="header-stats">
        <span><b id="totalItems">-</b> 更新</span>
        <span><b id="sourceCount">-</b> 源</span>
        <span id="updatedAt">-</span>
      </div>
    </header>

    <nav class="controls">
      <div class="search-box">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search" id="searchInput" class="search-input" placeholder="搜索..." />
      </div>

      <div class="select-wrapper">
        <select id="siteSelect" class="site-select">
          <option value="">全部站点</option>
        </select>
        <svg class="select-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </nav>

    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab active" data-category="all">全部</button>
      <button class="category-tab" data-category="news">新闻</button>
      <button class="category-tab" data-category="tech">技术</button>
      <button class="category-tab" data-category="tools">工具</button>
      <button class="category-tab" data-category="research">研究</button>
      <button class="category-tab" data-category="company">公司</button>
    </div>

    <main class="main-content">
      <div class="section-header">
        <h2 class="section-title" id="sectionTitle">全部</h2>
        <span class="result-count" id="resultCount">加载中...</span>
      </div>
      <div class="news-grid" id="newsList"></div>
    </main>

    <footer class="footer">
      数据每30分钟自动更新 | <a href="https://github.com/itech001/oh-my-news" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script>
      let newsData = null;
      let currentCategory = 'all';
      let searchQuery = '';
      let selectedSite = '';

      const searchInput = document.getElementById('searchInput');
      const siteSelect = document.getElementById('siteSelect');
      const categoryTabs = document.querySelectorAll('.category-tab');
      const newsList = document.getElementById('newsList');
      const resultCount = document.getElementById('resultCount');
      const sectionTitle = document.getElementById('sectionTitle');
      const totalItems = document.getElementById('totalItems');
      const sourceCount = document.getElementById('sourceCount');
      const updatedAt = document.getElementById('updatedAt');

      // Category keywords
      const categoryKeywords = {
        news: ['新闻', '发布', '宣布', '推出', '上线', '发布', 'news', 'release', 'launch', 'announce'],
        tech: ['技术', '模型', '算法', '训练', '推理', 'tech', 'model', 'algorithm', 'training', 'inference'],
        tools: ['工具', '软件', '应用', '平台', 'API', 'tool', 'software', 'app', 'platform'],
        research: ['研究', '论文', '实验', '发现', 'research', 'paper', 'study', 'experiment'],
        company: ['公司', '融资', '收购', '合作', 'OpenAI', 'Google', 'Microsoft', 'company', 'funding', 'acquisition']
      };

      // Categorize item
      function categorizeItem(item) {
        const title = (item.title_zh || item.title || item.title_en || '').toLowerCase();

        for (const [category, keywords] of Object.entries(categoryKeywords)) {
          for (const keyword of keywords) {
            if (title.toLowerCase().includes(keyword.toLowerCase())) {
              return category;
            }
          }
        }
        return 'news'; // Default
      }

      function formatTime(item) {
        const timestamp = item.published_at || item.first_seen_at;
        if (!timestamp) return '';

        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        const hours = Math.floor(diff / (1000 * 60 * 60));

        if (hours < 1) {
          const minutes = Math.floor(diff / (1000 * 60));
          return `${minutes}m`;
        } else if (hours < 24) {
          return `${hours}h`;
        } else {
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
      }

      async function loadData() {
        try {
          console.log('Loading data...');
          const response = await fetch('./data/latest-24h.json');

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          newsData = await response.json();
          console.log('Loaded:', newsData.total_items, 'items');

          updateStats();
          populateSiteSelect();
          renderNews();
        } catch (error) {
          console.error('Failed to load:', error);
          newsList.innerHTML = '<div class="empty-state">加载失败，请确保在服务器环境下运行</div>';
        }
      }

      function updateStats() {
        totalItems.textContent = newsData.total_items.toLocaleString();
        sourceCount.textContent = newsData.site_count;
        updatedAt.textContent = new Date(newsData.generated_at).toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function populateSiteSelect() {
        newsData.site_stats.forEach(site => {
          if (site.count > 0) {
            const option = document.createElement('option');
            option.value = site.site_id;
            option.textContent = `${site.site_name} (${site.count})`;
            siteSelect.appendChild(option);
          }
        });
      }

      function filterNews(items) {
        return items.filter(item => {
          // Category filter
          if (currentCategory !== 'all') {
            const itemCategory = categorizeItem(item);
            if (itemCategory !== currentCategory) return false;
          }

          // Site filter
          if (selectedSite && item.site_id !== selectedSite) return false;

          // Search filter
          if (searchQuery) {
            const query = searchQuery.toLowerCase();
            const titleZh = (item.title_zh || item.title || '').toLowerCase();
            const titleEn = (item.title_en || '').toLowerCase();
            const source = (item.source || '').toLowerCase();
            return titleZh.includes(query) || titleEn.includes(query) || source.includes(query);
          }

          return true;
        });
      }

      function createNewsCard(item) {
        const card = document.createElement('article');
        card.className = 'news-card';

        const metaHtml = `
          <div class="card-meta">
            <span class="site-badge">${item.site_name}</span>
            ${item.source ? `<span class="source-badge">${item.source}</span>` : ''}
            <time class="time-badge">${formatTime(item)}</time>
          </div>
        `;

        const titleZh = item.title_zh || item.title || '';
        const titleEn = item.title_en || '';

        let titleHtml = `<h3 class="card-title">${titleZh}</h3>`;
        if (titleEn && titleEn !== titleZh) {
          titleHtml += `<p class="card-title-en">${titleEn}</p>`;
        }

        card.innerHTML = metaHtml + titleHtml;

        card.addEventListener('click', () => {
          if (item.url) {
            window.open(item.url, '_blank', 'noopener,noreferrer');
          }
        });

        return card;
      }

      function renderNews() {
        const filtered = filterNews(newsData.items || []);

        resultCount.textContent = `${filtered.length} 条`;

        if (filtered.length === 0) {
          newsList.innerHTML = '<div class="empty-state">暂无数据</div>';
        } else {
          newsList.innerHTML = '';
          filtered.forEach(item => {
            newsList.appendChild(createNewsCard(item));
          });
        }
      }

      // Event Listeners
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderNews();
      });

      siteSelect.addEventListener('change', (e) => {
        selectedSite = e.target.value;
        renderNews();
      });

      categoryTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          categoryTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentCategory = tab.dataset.category;

          const titles = {
            all: '全部',
            news: '新闻',
            tech: '技术',
            tools: '工具',
            research: '研究',
            company: '公司'
          };
          sectionTitle.textContent = titles[currentCategory] || '全部';

          renderNews();
        });
      });

      // Init
      loadData();
    </script>
  </body>
</html>
